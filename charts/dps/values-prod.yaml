replicaCount: 3
kafka:
  clusterName: kafka-prod-dimo-kafka
env:
  KAFKA_BOOTSTRAP_SERVERS: kafka-prod-dimo-kafka-kafka-bootstrap
  ENVIRONMENT: prod
  LOG_LEVEL: INFO
  PARQUET_BUCKET: dimo-storage-prod
ingress:
  enabled: false
resources:
  limits:
    cpu: 3000m
    memory: 2000Mi
  requests:
    cpu: 3000m
    memory: 2000Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
image:
  tag: 0.0.21
