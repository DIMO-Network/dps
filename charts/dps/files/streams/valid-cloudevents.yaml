input:
  label: kafka_input
  kafka_franz:
    seed_brokers:
      - ${KAFKA_BOOTSTRAP_SERVERS:localhost}:${KAFKA_BOOTSTRAP_PORT:9092}
    topics:
      - '${DEVICE_VALID_CE_TOPIC:topic.device.validcloudevents}'
    consumer_group: "zone.dimo.dps.validcloudevents"
    client_id: ${CONTAINER_NAME:localhost}-dps-valid-ce
    rack_id: ${NODE_NAME:localhost}
    fetch_max_bytes: 100MiB
    fetch_max_wait: 50ms
    fetch_min_bytes: 1B
    fetch_max_partition_bytes: 10MiB
    commit_period: 5s
    checkpoint_limit: 1000000
    start_offset: "latest"
    batching:
      count: 10000
      period: "5s"


pipeline:
  processors:
    - label: "inputlogger"
      for_each:
        - log:
            level: DEBUG
            message: 'MessageReceived'
            fields_mapping: |
              root.payload = this
    - label: "valid_cloudevent_to_parquet_2"
      dimo_cloudevent_to_parquet:
        prefix: cloudevent/valid/

output:
  label: "insert_valid_cloudevent"
  fallback:
    - broker:
        pattern: fan_out_sequential_fail_fast
        outputs:
          - fallback:
              - label: "insert_valid_cloudevent_parquet_s3"
                switch:
                  cases:
                    - check: 'metadata("dimo_s3_upload_key").or("") != ""'
                      output:
                        aws_s3:
                          bucket: ${PARQUET_BUCKET}
                          path: ${!metadata("dimo_s3_upload_key")}
                          content_type: application/octet-stream
                          region: ${S3_AWS_REGION}
                          credentials:
                            id: ${S3_AWS_ACCESS_KEY_ID}
                            secret: ${S3_AWS_SECRET_ACCESS_KEY}
                    # Original CE messages (no upload key) — drop silently
                    - check: ''
                      output:
                        drop: {}
              # reject the batch so CH index insert is not attempted without backing parquet file
              - label: 'insert_valid_cloudevent_s3_failure'
                reject: '${!metadata("fallback_error").or("failed to store parquet file")}'
                processors:
                  -  mutation: |
                       meta dimo_component = "insert_valid_cloudevent_parquet_s3"
                  - resource: "handle_db_error"

          - fallback:
              - label: "insert_valid_cloudevent_clickhouse"
                switch:
                  cases:
                    # Original CE messages — insert into CH index
                    - check: 'metadata("dimo_s3_upload_key").or("") == ""'
                      output:
                        sql_insert:
                          driver: clickhouse
                          dsn: clickhouse://${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT}/${CLICKHOUSE_INDEX_DATABASE}?username=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}&secure=true&dial_timeout=5s&max_execution_time=300
                          table: cloud_event
                          columns: []
                          args_mapping: root = this
                          batching:
                            count: 500000
                            byte_size: 0
                            period: "2s"
                            check: ""
                          processors:
                            - label: "split_values_valid"
                              dimo_split_values: {}
                            - catch:
                                -  mutation: |
                                     meta dimo_component = "split_values_valid"
                                - resource: "handle_db_error"
                                - mapping: root = deleted()
                    # Parquet message — not for CH, drop
                    - check: ''
                      output:
                        drop: {}

              - label: 'insert_valid_cloudevent_clickhouse_failure'
                switch:
                  cases:
                    - check: 'metadata("fallback_error").or("").contains("bad connection")'
                      output:
                        reject: metadata("fallback_error")
                        processors:
                          - resource: "handle_db_connection_error"
                    - check: ''
                      output:
                        drop: {}
                        processors:
                          -  mutation: |
                              meta dimo_component = "insert_valid_cloudevent_clickhouse"
                          - resource: "handle_db_error"
    - drop: {}
